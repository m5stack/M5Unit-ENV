name: Build(platformio)

on:
  push:
    tags-ignore:
      - '*.*.*'
      - 'v*.*.*'
    branches:
      - '*'
    paths:
      - 'src/**'
      - 'examples/UnitUnified/**.ino'
      - 'examples/UnitUnified/**.cpp'
      - 'examples/UnitUnified/**.hpp'
      - 'examples/UnitUnified/**.h'
      - 'examples/UnitUnified/**.c'
      - '.github/workflows/platformio-build-check.yml'
      - 'platformio.ini'
      - 'unit_*_env.ini'
      - 'extra_script.py'
  pull_request:
    paths:
      - 'src/**'
      - 'examples/UnitUnified/**.ino'
      - 'examples/UnitUnified/**.cpp'
      - 'examples/UnitUnified/**.hpp'
      - 'examples/UnitUnified/**.h'
      - 'examples/UnitUnified/**.c'
      - '.github/workflows/platformio-build-check.yml'
      - 'platformio.ini'
      - 'unit_*_env.ini'
      - 'extra_script.py'
  workflow_dispatch:

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.unit }}:${{ matrix.example }}@${{ matrix.board }}:${{ matrix.framework }}:${{ matrix.espressif32 }}
    runs-on: ubuntu-latest
    timeout-minutes: 12

    strategy:
      fail-fast: false
      max-parallel: 20
      
      matrix:
        example:
          - PlotToSerial

        unit:
          - UnitCO2
          - UnitCO2L
          - UnitENVIII
          - UnitENVIV
          - UnitENVPro
          - UnitTVOC

        board:
          - Core
          - Core2
          - CoreS3
          - Fire
          - StampS3
          - Dial
          - Atom
          - AtomS3
          - AtomS3R
          - NanoC6
          - StickCPlus
          - StickCPlus2
          - StickS3
          - Paper
          - CoreInk
          - Cardputer
          - Tab5
          - NessoN1

        framework:
          - Arduino

        espressif32:
          - latest


        include:
          # Specific sketches
          # Paper
          - example: Paper
            unit: BuiltinSHT30
            board: Paper
            framework: Arduino
            espressif32: latest
          # HatENV3
          - example: PlotToSerial
            unit: HatENVIII
            board: StickCPlus
            framework: Arduino
            espressif32: latest
          - example: PlotToSerial
            unit: HatENVIII
            board: StickCPlus2
            framework: Arduino
            espressif32: latest
          - example: PlotToSerial
            unit: HatENVIII
            board: StickS3
            framework: Arduino
            espressif32: latest
          - example: PlotToSerial
            unit: HatENVIII
            board: CoreInk
            framework: Arduino
            espressif32: latest
          - example: PlotToSerial
            unit: HatENVIII
            board: NessoN1
            framework: Arduino
            espressif32: latest


    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install intelhex
        run: pip install intelhex

      - name: Build examples
        uses: karniv00l/platformio-run-action@v1
        with:
          environments: ${{ matrix.unit != '' && format('{0}_{1}_{2}_{3}_{4}', matrix.unit, matrix.example, matrix.board, matrix.framework, matrix.espressif32) || format('{0}_{1}_{2}_{3}', matrix.example, matrix.board, matrix.framework, matrix.espressif32) }}
#         targets:
          project-dir: "./"
          project-conf: "./platformio.ini"
#          jobs: 6
#          silent: false
#          verbose: true
#          disable-auto-clean: false

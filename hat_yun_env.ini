; Hat port (StickCPlus / StickCPlus2 only)
;SHT20
[env:test_Hat_SHT20_StickCPlus]
extends=StickCPlus, option_release, arduino_latest
lib_deps = ${StickCPlus.lib_deps}
  ${test_fw.lib_deps}
test_filter= embedded/test_sht20
build_flags = ${option_release.build_flags}
 -D USING_HAT_SHT20


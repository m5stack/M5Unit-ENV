;Examples
;HatYun
[env:HatYun_HatYunEnvironmentGlow_StickCPlus_Arduino_latest]
extends=StickCPlus, option_release, arduino_latest
build_src_filter = +<*> -<.git/> -<.svn/> +<../examples/UnitUnified/HatYun/HatYunEnvironmentGlow>
build_flags = ${option_release.build_flags}
 -D USING_HAT_YUN

[env:HatYun_HatYunEnvironmentGlow_StickCPlus2_Arduino_latest]
extends=StickCPlus2, option_release, arduino_latest
build_src_filter = +<*> -<.git/> -<.svn/> +<../examples/UnitUnified/HatYun/HatYunEnvironmentGlow>
build_flags = ${option_release.build_flags}
 -D USING_HAT_YUN

; For Hat Yun
; Note: Hat Yun physically connects only to StickC / StickCPlus / StickCPlus2

;UnitTest
; SHT20 (GROVE — all boards, prepared for future standalone SHT20 unit use)
[env:test_SHT20_Core]
extends=Core, option_release, arduino_latest
lib_deps = ${Core.lib_deps}
  ${test_fw.lib_deps}
test_filter= embedded/test_sht20

[env:test_SHT20_Core2]
extends=Core2, option_release, arduino_latest
